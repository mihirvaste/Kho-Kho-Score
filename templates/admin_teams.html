<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body {margin:0; font-family:Arial, sans-serif; background:#f3f4f6;}
    .layout {display:flex; min-height:100vh;}
    .sidebar {width:260px; background:#111827; color:#f8fafc; display:flex; flex-direction:column;}
    .sidebar .header {padding:24px 20px; font-size:1.1rem; font-weight:700; border-bottom:1px solid rgba(255,255,255,.12);}
    .sidebar nav {flex:1; padding:12px 0;}
    .sidebar a, .sidebar button {width:100%; text-align:left; background:none; border:none; color:inherit; padding:14px 22px; cursor:pointer; font-size:0.95rem; display:block}
    .main {flex:1; display:flex; flex-direction:column;}
    .topbar {display:flex; justify-content:space-between; align-items:center; padding:18px 26px; background:#fff; border-bottom:1px solid #e5e7eb;}
    .content {padding:26px; flex:1;}
    .page-header {display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:24px;}
    .button-primary {background:#2563eb; color:#fff; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-weight:700;}
    .stats-grid {display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; margin-bottom:24px;}
    .card {background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:20px; cursor:pointer;}
    .card:hover {box-shadow:0 10px 20px rgba(0,0,0,.05);}
    .search-bar {display:flex; gap:12px; margin-bottom:18px;}
    .search-bar input {flex:1; padding:12px 14px; border:1px solid #d1d5db; border-radius:12px;}
    .table-wrap {background:#fff; border:1px solid #e5e7eb; border-radius:18px; overflow:hidden;}
    table {width:100%; border-collapse:collapse;}
    thead {background:#f9fafb;}
    th, td {padding:12px; text-align:left; border-bottom:1px solid #e5e7eb; font-size:0.95rem;}
    .actions button {margin-right:8px; background:none; border:1px solid #d1d5db; padding:8px 12px; border-radius:10px; cursor:pointer;}
    .modal-backdrop {position:fixed; inset:0; background:rgba(15,23,42,.55); display:none; align-items:center; justify-content:center; padding:20px;}
    .modal {background:#fff; border-radius:18px; width:100%; max-width:720px; max-height:90vh; overflow:auto; padding:24px;}
    .hidden {display:none;}
  </style>
  <script>
    const teamState = {blocked: null, q: '', page: 1, pageSize: 6};

    function loadTeamStats(){
      fetch('/api/teams/stats')
        .then(r => r.json())
        .then(s => {
          document.getElementById('all-team-count').textContent = s.total;
          document.getElementById('blocked-team-count').textContent = s.blocked;
        });
    }

    function renderPagination(total, current, perPage){
      const container = document.getElementById('team-pagination');
      container.innerHTML = '';
      const totalPages = Math.max(1, Math.ceil(total / perPage));
      function btn(label, page, disabled){
        const b = document.createElement('button');
        b.textContent = label;
        b.disabled = !!disabled;
        b.onclick = () => {teamState.page = page; loadTeams();};
        b.style.padding = '8px 10px';
        return b;
      }
      container.appendChild(btn('« Prev', Math.max(1, current - 1), current <= 1));
      const start = Math.max(1, current - 3);
      const end = Math.min(totalPages, start + 6);
      for(let p = start; p <= end; p++){
        const b = document.createElement('button');
        b.textContent = p;
        if(p === current){ b.style.fontWeight = '700'; b.disabled = true; }
        b.onclick = (() => { const page = p; return () => {teamState.page = page; loadTeams();}; })();
        b.style.padding = '8px 10px';
        container.appendChild(b);
      }
      container.appendChild(btn('Next »', Math.min(totalPages, current + 1), current >= totalPages));
    }

    function loadTeams(){
      const params = new URLSearchParams();
      if(teamState.blocked !== null) params.set('blocked', teamState.blocked ? '1' : '0');
      if(teamState.q) params.set('q', teamState.q);
      params.set('page', teamState.page);
      params.set('page_size', teamState.pageSize);
      fetch('/api/teams?' + params)
        .then(r => r.json())
        .then(d => {
          const tbody = document.getElementById('team-body');
          tbody.innerHTML = '';
          d.teams.forEach(team => {
            const tr = document.createElement('tr');
            const cols = [team.team_id, team.team_name, team.tournament_id || '', team.tournament_name || '', team.address || '', team.manager_id || ''];
            cols.forEach(c => { const td = document.createElement('td'); td.textContent = c; tr.appendChild(td); });
            const actionTd = document.createElement('td'); actionTd.className = 'actions';
            const editBtn = document.createElement('button'); editBtn.textContent = 'Edit'; editBtn.addEventListener('click', () => openEdit(team.team_id));
            const delBtn = document.createElement('button'); delBtn.textContent = 'Delete'; delBtn.addEventListener('click', () => confirmDelete(team.team_id));
            const blockBtn = document.createElement('button'); blockBtn.textContent = team.blocked ? 'Unblock' : 'Block'; blockBtn.addEventListener('click', () => toggleBlock(team.team_id, !team.blocked));
            [blockBtn, editBtn, delBtn].forEach(b => { b.style.marginRight = '8px'; actionTd.appendChild(b); });
            tr.appendChild(actionTd);
            tbody.appendChild(tr);
          });
          renderPagination(d.total, teamState.page, teamState.pageSize);
        });
    }

    function setTeamFilter(blocked){
      teamState.blocked = blocked;
      teamState.page = 1;
      loadTeams();
    }

    async function loadTeamSelectOptions(){
      const tournamentSelect = document.getElementById('team-tournament');
      const managerSelect = document.getElementById('team-manager');
      tournamentSelect.innerHTML = '<option value="">Select tournament</option>';
      managerSelect.innerHTML = '<option value="">Select manager</option>';

      try {
        const res = await fetch('/api/tournaments');
        if(res.ok){
          const data = await res.json();
          data.tournaments.forEach(t => {
            const option = document.createElement('option');
            option.value = t.tournament_id;
            option.textContent = t.name;
            tournamentSelect.appendChild(option);
          });
        }
      } catch (err) {
        console.error('Unable to load tournaments', err);
      }

      try {
        const res = await fetch('/api/managers');
        if(res.ok){
          const data = await res.json();
          (data.managers || []).forEach(m => {
            const option = document.createElement('option');
            option.value = m.manager_id;
            option.textContent = m.name || m.manager_id;
            managerSelect.appendChild(option);
          });
        }
      } catch (err) {
        console.error('Unable to load managers', err);
      }
    }

    function openAdd(){
      document.getElementById('team-form').reset();
      document.getElementById('team-id-row').classList.add('hidden');
      loadTeamSelectOptions().then(() => {
        document.getElementById('team-modal-backdrop').style.display = 'flex';
        document.getElementById('team-modal-title').textContent = 'Add Team';
      });
    }

    function openEdit(id){
      loadTeamSelectOptions().then(() => {
        fetch('/api/teams/' + id)
          .then(r => r.json())
          .then(team => {
            document.getElementById('team-id-row').classList.remove('hidden');
            document.getElementById('team-id').value = team.team_id || '';
            document.getElementById('team-name').value = team.team_name || '';
            document.getElementById('team-tournament').value = team.tournament_id || '';
            document.getElementById('team-address').value = team.address || '';
            document.getElementById('team-manager').value = team.manager_id || '';
            document.getElementById('team-modal-backdrop').style.display = 'flex';
            document.getElementById('team-modal-title').textContent = 'Edit Team';
          });
      });
    }

    function confirmDelete(id){
      if(!confirm('Are you sure you want to delete this team?')) return;
      fetch('/api/teams/' + id, {method: 'DELETE'})
        .then(() => {loadTeamStats(); loadTeams();});
    }

    function toggleBlock(id, block){
      if(!confirm('Are you sure you want to ' + (block ? 'block' : 'unblock') + ' this team?')) return;
      fetch('/api/teams/' + id + '/block', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({blocked: block})})
        .then(() => {loadTeamStats(); loadTeams();});
    }

    async function saveTeam(e){
      e.preventDefault();
      const id = document.getElementById('team-id').value;
      const data = {
        team_name: document.getElementById('team-name').value.trim(),
        tournament_id: document.getElementById('team-tournament').value || null,
        address: document.getElementById('team-address').value.trim(),
        manager_id: document.getElementById('team-manager').value || null,
      };
      if(!data.team_name){ alert('Team name is required'); return; }
      try {
        let res;
        if(!id){
          res = await fetch('/api/teams', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
        } else {
          res = await fetch('/api/teams/' + id, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
        }
        const body = await res.json().catch(() => null);
        if(!res.ok){
          alert('Failed to save: ' + (body && (body.error || body.detail) ? (body.error + ' - ' + (body.detail || '')) : res.statusText));
          return;
        }
        closeTeamModal();
        loadTeamStats();
        loadTeams();
      } catch(err){
        alert('Network or server error: ' + err.message);
      }
    }

    function closeTeamModal(){
      document.getElementById('team-modal-backdrop').style.display = 'none';
    }

    function openCreateLink(){
      document.getElementById('team-link-backdrop').style.display = 'flex';
      document.getElementById('team-link-list').classList.remove('hidden');
      document.getElementById('team-link-result').classList.add('hidden');
    }

    function createTeamLink(){
      const sel = document.querySelector('input[name=team_link_ttl]:checked');
      if(!sel){ alert('Select a duration'); return; }
      const seconds = parseInt(sel.value);
      fetch('/api/teams/links', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({expires_seconds: seconds})})
        .then(r => r.json())
        .then(d => {
          document.getElementById('team-generated-link').textContent = d.link;
          document.getElementById('team-link-list').classList.add('hidden');
          document.getElementById('team-link-result').classList.remove('hidden');
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadTeamStats();
      loadTeams();
      document.getElementById('team-search').addEventListener('input', e => {teamState.q = e.target.value; teamState.page = 1; loadTeams();});
      document.getElementById('add-team').addEventListener('click', openAdd);
      document.getElementById('create-team-link').addEventListener('click', openCreateLink);
      document.getElementById('team-form').addEventListener('submit', saveTeam);
      document.getElementById('team-close-modal').addEventListener('click', closeTeamModal);
      document.getElementById('team-close-link').addEventListener('click', () => {document.getElementById('team-link-backdrop').style.display = 'none';});
      document.getElementById('team-close-link-2').addEventListener('click', () => {document.getElementById('team-link-backdrop').style.display = 'none';});
    });
  </script>
</head>
<body>
  <div class="layout">
    <!-- include: partials/sidebar.html -->
    <section class="main">
      <!-- include: partials/topbar.html -->
      <!-- include: partials/teams_content.html -->
    </section>
  </div>
  <!-- include: partials/teams_modals.html -->
</body>
</html>
