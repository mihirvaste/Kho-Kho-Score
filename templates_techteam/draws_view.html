<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draws - {{ tournament_name }}</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; color:#111827; }
    .layout { display:flex; min-height:100vh; }
    .sidebar { width:260px; background:#0f172a; color:#f8fafc; display:flex; flex-direction:column; }
    .sidebar .brand { padding:22px 20px; font-size:1.05rem; font-weight:700; border-bottom:1px solid rgba(255,255,255,.12); }
    .sidebar nav { flex:1; padding:10px 0; }
    .sidebar a { display:block; color:inherit; text-decoration:none; padding:12px 20px; }
    .sidebar a:hover { background:rgba(255,255,255,.08); }
    .main { flex:1; padding:24px; }
    .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .toolbar h1 { margin:0; font-size:1.8rem; }
    .toolbar input { padding:10px 14px; border-radius:12px; border:1px solid #d1d5db; width:320px; max-width:100%; }
    .toolbar select { padding:10px 14px; border-radius:12px; border:1px solid #d1d5db; }
    .card { background:#fff; border-radius:16px; border:1px solid #e5e7eb; padding:20px; }
    .table-wrapper { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:14px 12px; border:1px solid #e5e7eb; text-align:left; }
    th { background:#f3f4f6; }
    .muted { color:#6b7280; }
    button { border:none; background:#2563eb; color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer; }
    .secondary { background:#10b981; }
    .empty-state { padding:40px; text-align:center; color:#6b7280; }
    /* modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
    .modal{background:#fff;padding:18px;border-radius:10px;max-width:520px;width:100%;box-shadow:0 8px 24px rgba(0,0,0,.2)}
    .modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .btn-danger{background:#dc2626}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Tech Team Panel</div>
      <nav>
        <a href="/home">Home</a>
        <a href="/umpires">Umpire</a>
        <a href="/managers">Manager</a>
        <a href="/teams">Teams</a>
        <a href="/players">Players</a>
        <a href="/tournaments">Tournament Matches</a>
      </nav>
      <div class="logout"><a href="/logout" style="padding:12px 20px; display:block; color:inherit;">Logout</a></div>
    </aside>
    <section class="main">
      <div class="toolbar">
        <div>
          <h1>{{ tournament_name }}</h1>
          <div class="muted">Draws</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <input id="search-input" type="search" placeholder="Search by match, team, umpire, stage..." />
          <select id="stage-filter" aria-label="Filter matches by stage">
            <option value="all">All stages</option>
            <option value="group">Group Stage</option>
            <option value="manual">Manual</option>
          </select>
          <button id="filter-button" type="button">Filter</button>
        </div>
      </div>
      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Match ID</th>
                <th>Match #</th>
                <th>Stage</th>
                <th>Team A</th>
                <th>Team B</th>
                <th>Status</th>
                <th>Follow On</th>
                <th>Winner</th>
                <th>Win Type</th>
                <th>Win Margin</th>
                <th>Umpire ID</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="draws-table-body"></tbody>
          </table>
        </div>
        <div id="draws-empty" class="empty-state">Loading draw data...</div>
      </div>
    </section>
  </div>
  <script>
    (function(){
      const tournamentId = '{{ tournament_id }}';
      const body = document.getElementById('draws-table-body');
      const emptyState = document.getElementById('draws-empty');
      const searchInput = document.getElementById('search-input');
      const stageFilter = document.getElementById('stage-filter');
      const filterButton = document.getElementById('filter-button');
      window.drawRows = window.drawRows || [];

      function escapeHtml(value){ return String(value||'').replace(/[&<>\"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[ch])); }

      function renderRows(rows){
        if(!rows.length){
          body.innerHTML = '';
          emptyState.textContent = 'No draws available for this tournament.';
          emptyState.style.display = 'block';
          return;
        }
        emptyState.style.display = 'none';
        body.innerHTML = rows.map(r => `
          <tr data-match-id="${escapeHtml(r.match_id)}">
            <td>${escapeHtml(r.match_id)}</td>
            <td>${escapeHtml(r.match_number)}</td>
            <td>${escapeHtml(r.stage_name)}</td>
            <td>${escapeHtml(r.team_a_name || r.team_a_id)}</td>
            <td>${escapeHtml(r.team_b_name || r.team_b_id)}</td>
            <td>${escapeHtml(r.match_status || '')}</td>
            <td>${r.is_follow_on_enforced ? 'Yes' : 'No'}</td>
            <td>${escapeHtml(r.final_winner_id || '')}</td>
            <td>${escapeHtml(r.win_type || '')}</td>
            <td>${escapeHtml(r.win_margin || '')}</td>
            <td>${escapeHtml(r.umpire_id || '')}</td>
            <td><button type="button" class="delete-btn btn-danger" data-id="${escapeHtml(r.match_id)}">Delete</button></td>
          </tr>
        `).join('');

        // wire up delete buttons
        body.querySelectorAll('.delete-btn').forEach(btn=>{
          btn.addEventListener('click', e=>{
            const id = e.currentTarget.dataset.id;
            const row = rows.find(x => String(x.match_id) === String(id));
            showDeleteConfirm(row);
          });
        });
      }

      function loadDraws(){
        fetch(`/api/matches?tournament_id=${encodeURIComponent(tournamentId)}`)
          .then(r=>r.json())
          .then(data=>{
            window.drawRows = data || [];
            renderRows(window.drawRows);
          })
          .catch(()=>{
            body.innerHTML = '';
            emptyState.textContent = 'Failed to load draws.';
          });
      }

      function filterRows(){
        const term = searchInput.value.toLowerCase();
        const stage = stageFilter.value;
        const filtered = window.drawRows.filter(r => {
          const isManual = String(r.stage_name).toLowerCase() === 'manual';
          const matchesStage = stage === 'all' || (stage === 'manual' ? isManual : !isManual);
          return matchesStage && (
            String(r.match_id).toLowerCase().includes(term) ||
            String(r.match_number).toLowerCase().includes(term) ||
            String(r.stage_name).toLowerCase().includes(term) ||
            String(r.team_a_name).toLowerCase().includes(term) ||
            String(r.team_b_name).toLowerCase().includes(term) ||
            String(r.match_status).toLowerCase().includes(term) ||
            String(r.umpire_id).toLowerCase().includes(term)
          );
        });
        renderRows(filtered);
      }

      searchInput.addEventListener('input', filterRows);
      filterButton.addEventListener('click', filterRows);
      // export helper functions for modal script
      window.renderRows = renderRows;
      window.loadDraws = loadDraws;
      loadDraws();
    })();
  </script>
  <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-hidden="true">
    <div class="modal" role="document">
      <div id="modal-message">Are you sure you want to delete this match?</div>
      <div class="actions">
        <button id="modal-cancel" type="button">No</button>
        <button id="modal-confirm" type="button" class="btn-danger">Yes</button>
      </div>
    </div>
  </div>
  <script>
    (function(){
      const backdrop = document.getElementById('modal-backdrop');
      const msg = document.getElementById('modal-message');
      const btnCancel = document.getElementById('modal-cancel');
      const btnConfirm = document.getElementById('modal-confirm');
      let pendingMatch = null;

      window.showDeleteConfirm = function(match){
        pendingMatch = match;
        const a = match && (match.team_a_name || match.team_a_id) || '';
        const b = match && (match.team_b_name || match.team_b_id) || '';
        const num = match && (match.match_number || match.match_id) || '';
        msg.textContent = `Are you sure you want to delete Match ${num}: ${a} vs ${b}?`;
        backdrop.style.display = 'flex';
        backdrop.setAttribute('aria-hidden','false');
      };

      function closeModal(){ pendingMatch = null; backdrop.style.display='none'; backdrop.setAttribute('aria-hidden','true'); }

      btnCancel.addEventListener('click', ()=>closeModal());

      btnConfirm.addEventListener('click', ()=>{
        if(!pendingMatch) return closeModal();
        const id = pendingMatch.match_id;
        // optimistically remove from UI immediately
        window.drawRows = window.drawRows.filter(x=>String(x.match_id)!==String(pendingMatch.match_id));
        window.renderRows(window.drawRows);
        closeModal();

        fetch('/api/matches/' + encodeURIComponent(id), { method: 'DELETE', credentials: 'same-origin' })
          .then(r=>{
            if(r.ok) return;
            // if server indicates failure, inform user and reload to reflect actual state
            return r.json().then(j=>{ alert('Delete failed: '+(j && j.error || '')); window.loadDraws(); }).catch(()=>{ alert('Delete failed'); window.loadDraws(); });
          })
          .catch(()=>{ alert('Delete request failed'); window.loadDraws(); });
      });
    })();
  </script>
</body>
</html>
