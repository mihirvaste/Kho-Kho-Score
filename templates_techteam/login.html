<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f172a, #0369a1); color: #fff; min-height: 100vh; display: grid; place-items: center; }
    .card { width: min(92vw, 460px); background: rgba(255,255,255,0.95); color: #111827; border-radius: 20px; padding: 28px; box-shadow: 0 16px 40px rgba(0,0,0,0.25); }
    h1 { margin-top: 0; font-size: 1.6rem; }
    form { display: grid; gap: 12px; }
    input { padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; }
    button { padding: 12px 14px; border: none; border-radius: 10px; background: #0369a1; color: #fff; font-weight: 700; cursor: pointer; }
    .message { color: #b91c1c; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tech Team Portal</h1>
    <p>Sign in with your tech team credentials.</p>
    {{ message }}
    <form method="post" action="/login">
      <input name="username" placeholder="Tech team ID or email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
