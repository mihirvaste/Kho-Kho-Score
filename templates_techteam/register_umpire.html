<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f3f4f6;padding:40px;margin:0}
    .card{max-width:640px;margin:0 auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 20px 40px rgba(15,23,42,.08)}
    h2{color:#1f2937;margin-top:0}
    label{display:block;margin:16px 0 6px 0;font-weight:600;color:#1f2937}
    input,select{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box;font-size:14px}
    input:required,select:required{border-color:#ef4444}
    .button-container{text-align:right;margin-top:20px}
    .button-primary{background:#2563eb;color:#fff;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
    .button-primary:hover{background:#1d4ed8}
    .success-message{background:#dcfce7;border:1px solid #86efac;color:#166534;padding:16px;border-radius:8px;margin-bottom:20px;display:none}
    .error-message{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:16px;border-radius:8px;margin-bottom:20px;display:none}
    .form-group{margin-bottom:16px}
    .required{color:#ef4444}
  </style>
  <script>
    async function submitReg(e){
      e.preventDefault();
      const token = new URLSearchParams(location.search).get('token');
      if(!token){
        showError('Invalid registration link');
        return;
      }
      const data = {
        name: document.getElementById('name').value.trim(),
        password: document.getElementById('password').value,
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        kkfi_number: document.getElementById('kkfi_number').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        aadhar_photo_url: document.getElementById('aadhar_photo_url').value.trim(),
      };
      // Validate mandatory fields
      if(!data.name||!data.password||!data.age||!data.gender||!data.kkfi_number||!data.phone||!data.email){
        showError('All fields marked with * are mandatory');
        return;
      }
      const res = await fetch('/register/umpire?token=' + encodeURIComponent(token), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      });
      const body = await res.json();
      if (!res.ok) { 
        showError(body.error || 'Registration failed'); 
        return; 
      }
      showSuccess(body.message || 'Umpire registered successfully!');
      document.getElementById('registration-form').reset();
      setTimeout(() => { window.location.href = '/'; }, 2000);
    }
    function showError(msg){
      const errorEl = document.getElementById('error-message');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      document.getElementById('success-message').style.display = 'none';
    }
    function showSuccess(msg){
      const successEl = document.getElementById('success-message');
      successEl.textContent = msg;
      successEl.style.display = 'block';
      document.getElementById('error-message').style.display = 'none';
    }
  </script>
</head>
<body>
  <div class="card">
    <h2>Umpire Registration</h2>
    <div id="success-message" class="success-message"></div>
    <div id="error-message" class="error-message"></div>
    <form onsubmit="submitReg(event)" id="registration-form">
      <div class="form-group">
        <label>Name <span class="required">*</span><input id="name" required></label>
      </div>
      <div class="form-group">
        <label>Password <span class="required">*</span><input id="password" type="password" required></label>
      </div>
      <div class="form-group">
        <label>Age <span class="required">*</span><input id="age" type="number" required></label>
      </div>
      <div class="form-group">
        <label>Gender <span class="required">*</span><select id="gender" required><option value="">Select Gender</option><option value="M">Male</option><option value="F">Female</option></select></label>
      </div>
      <div class="form-group">
        <label>KKFI Number <span class="required">*</span><input id="kkfi_number" required></label>
      </div>
      <div class="form-group">
        <label>Phone <span class="required">*</span><input id="phone" required></label>
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span><input id="email" type="email" required></label>
      </div>
      <div class="form-group">
        <label>Aadhar Photo URL <input id="aadhar_photo_url"></label>
      </div>
      <div class="button-container"><button class="button-primary" type="submit">Register Umpire</button></div>
    </form>
  </div>
</body>
</html>
